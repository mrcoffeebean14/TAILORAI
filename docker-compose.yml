version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: resumeforge-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/config/model_provider.yaml:/app/app/config/model_provider.yaml:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: resumeforge-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
