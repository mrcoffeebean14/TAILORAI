version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tailorai-prod-backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://${API_DOMAIN_NAME:-api.localhost}
    container_name: tailorai-prod-frontend
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: tailorai-prod-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - API_DOMAIN_NAME=${API_DOMAIN_NAME:-api.localhost}
      - ACME_EMAIL=${ACME_EMAIL:-singhmps14@gmail.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
